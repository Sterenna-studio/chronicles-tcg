<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Lab Award Test — Golds</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body{font:16px/1.5 system-ui,Segoe UI,Roboto,Helvetica,Arial;margin:40px;background:#0b0f14;color:#e7ecf3}
  button{padding:10px 14px;border-radius:10px;border:0;background:#2a66ff;color:#fff;cursor:pointer}
  .row{display:flex;gap:12px;align-items:center;margin-bottom:16px}
  code{background:#0d1420;border:1px solid #182642;border-radius:6px;padding:2px 6px}
</style>
<script type="module">
  import { awardGold, getBalance, getRecentLedger, makeRef } from '/shared/economy.js';
  import { requireLogin } from '/lab/tcg/logic/supaRaw.js';

  document.addEventListener('DOMContentLoaded', async () => {
    await requireLogin();
    await refresh();

    document.getElementById('btnPlus50').addEventListener('click', async () => {
      const ref = makeRef('lab-award-test');
      await awardGold({ delta: +50, source: 'lab-award-test', ref, metadata: { reason: 'manual test' } });
      await refresh();
    });

    document.getElementById('btnMinus20').addEventListener('click', async () => {
      const ref = makeRef('lab-award-test');
      await awardGold({ delta: -20, source: 'lab-award-test', ref, metadata: { reason: 'manual test debit' } });
      await refresh();
    });
  });

  async function refresh(){
    const bal = await getBalance();
    document.getElementById('balance').textContent = bal;
    const rows = await getRecentLedger(10);
    const ul = document.getElementById('ledger');
    ul.innerHTML = '';
    rows.forEach(r => {
      const li = document.createElement('li');
      li.textContent = `[${new Date(r.created_at).toLocaleString()}] ${r.delta > 0 ? '+' : ''}${r.delta} — ${r.source} — ${r.ref}`;
      ul.appendChild(li);
    });
  }
</script>
</head>
<body>
  <h1>Test d’intégration des Golds</h1>
  <div class="row">
    <div>Solde actuel : <strong id="balance">…</strong> 🪙</div>
    <button id="btnPlus50">+50 🪙</button>
    <button id="btnMinus20">−20 🪙</button>
  </div>
  <h3>Derniers mouvements</h3>
  <ul id="ledger"></ul>
  <p>Ref générée via <code>makeRef('lab-award-test')</code> — l’RPC est idempotent par (player, source, ref).</p>
</body>
</html>
