<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Admin – Packs</title>
  <link rel="stylesheet" href="../style.css">
  <script type="module" src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"></script>
  <script type="module" src="/shared/supabaseClient.js"></script>
  <script type="module" src="./admin.js" defer></script>
</head>
<body>
  <header><h1>Admin – Gestion des Packs</h1></header>
  <main>
    <form id="packForm">
      <label>Nom du Pack:<br><input name="name" type="text" required></label><br>
      <label>Prix (Gold):<br><input name="price" type="number" min="0" required></label><br>
      <label>Set ID:<br><input name="set_id" type="text" required></label><br>
      <label>Image du pack (fichier dans assets/packs):<br><input name="image_name" type="text" required></label><br>
      <label>Nb de cartes:<br><input name="card_count" type="number" min="1" required></label><br>
      <label><input name="require_champion" type="checkbox"> Champion obligatoire</label><br>
      <label><input name="require_epic" type="checkbox"> Epic obligatoire</label><br>
      <label><input name="require_legendary" type="checkbox"> Legendary obligatoire</label><br>
      <label><input name="require_mythical" type="checkbox"> Mythical obligatoire</label><br>
      <button type="submit">Créer le pack</button>
      <p id="statusMsg"></p>
    </form>
  </main>
</body>
</html>
