<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CIG</title>
  <link rel="stylesheet" href="../../styles/cig.css?v=classic-lab-1.3.0">
  <script type="module">
    import { url,bust } from '../../logic/paths.js?v=7';
    import { getClient,getUser } from '../../logic/supaRaw.js?v=7';
    import { loadPlayerCollection, loadPackTypes } from '../../supabaseData.js?v=7';

    async function main(){
      const supabase = await getClient();
      const user = (await getUser())||{};
      const userId = user.id;
      if(!userId) return;
      const { data: player } = await supabase.from('tcg_players').select('*').eq('id',userId).single();
      const packs = await supabase.from('tcg_player_packs').select('*').eq('player_id',userId);
      const types = await loadPackTypes();
      await loadPlayerCollection(userId);
      const owned = window.collection||[];

      const gold = player?.chronicles||0;
      const boostersOwned = packs.data?.reduce((a,b)=>a+(b.quantity||0),0)||0;
      let boostersBought = 0;
      let goldSpent = 0;
      (packs.data||[]).forEach(p=>{
        const t = types.find(x=>x.id===p.pack_type_id);
        const total = (p.quantity||0);
        boostersBought += total;
        if(t) goldSpent += (t.price||0)*total;
      });
      const boostersOpened = boostersBought - boostersOwned;
      const uniqueCards = owned.filter(r=>(r.quantity||0)>0).length;
      const totalCards = owned.reduce((a,b)=>a+(b.quantity||0),0);

      const isVip = new URLSearchParams(location.search).has('vip');
      const body = document.body; body.className = isVip?'cig-vip':'cig-dark';
      const card = document.createElement('div'); card.className='cig-card';
      if(isVip){
        const badge=document.createElement('div'); badge.className='vip-badge'; badge.textContent='VIP ✨'; card.appendChild(badge);
      }
      const title=document.createElement('div'); title.className='cig-title'; title.textContent='Carte d’Identification Galactique';
      const stats=document.createElement('div'); stats.className='cig-stats';
      stats.innerHTML = `
        <div>👤 Joueur: <b>${user.email||user.id}</b></div>
        <div>🪙 Or actuel: <b>${gold}</b></div>
        <div>📦 Boosters possédés: <b>${boostersOwned}</b></div>
        <div>✨ Boosters ouverts: <b>${boostersOpened}</b></div>
        <div>🃏 Cartes uniques: <b>${uniqueCards}</b></div>
        <div>📑 Total cartes: <b>${totalCards}</b></div>
        <div>💸 Or dépensé: <b>${goldSpent}</b></div>`;
      card.append(title,stats); body.appendChild(card);
    }
    main();
  </script>
</head>
<body></body>
</html>
