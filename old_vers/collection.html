<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Ma Collection</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="collection.css">
  <script type="module" src="./shared/supabaseClient.js"></script>
  <script type="module" src="./tcg_auth.js"></script>
  <script type="module" src="./supabaseData.js"></script>
  <script type="module" src="./collection.js" defer></script>
</head>
<body>
  <header>
    <div class="set-selector">
      <button class="set-btn active" data-set="bzh_set01">BZH Set01</button>
      <button class="set-btn" data-set="bzh_set02">BZH Set02</button>
      <button class="set-btn disabled">BZH Set03</button>
      <button class="set-btn disabled">BZH Set04</button>
      <button class="set-btn disabled">BZH Set05</button>
    </div>
  </header>
  <div class="collection-container">
    <div id="collectionGrid" class="collection-grid"></div>
  </div>
  <div class="pagination">
    <button id="prevPage" class="page-btn">◀</button><span id="pageIndicator"></span><button id="nextPage" class="page-btn">▶</button>
  </div>
  <div id="cardPopup" class="card-popup hidden">
    <div class="popup-backdrop"></div>
    <div class="popup-content">
      <div class="popup-info">
        <h2 id="popupName"></h2>
        <p><strong>Type :</strong> <span id="popupType"></span></p>
        <p><strong>Rareté :</strong> <span id="popupRarity"></span></p>
        <p id="popupDesc"></p>
      </div>
      <img id="popupImg" src="" alt="Artwork">
    </div>
  </div>
</body>
</html>
