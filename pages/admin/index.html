<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin — FX & SFX</title>
  <link rel="stylesheet" href="../../styles/style.css?v=v1.1.1-admin-fx" />
  <style>
    .admin-wrap { max-width: 860px; margin: 20px auto; padding: 0 16px; }
    .form { display:grid; gap: 10px; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); }
    .card { background:#0e1116; border:1px solid #30363d; border-radius:12px; padding:12px; }
    .row { display:flex; align-items:center; justify-content:space-between; gap:12px; margin:6px 0; }
    .row label { font-size: 14px; opacity: 0.9; }
    .preview { margin-top: 16px; display:flex; gap:12px; align-items:center; }
    .preview .flip-card { cursor: default; }
  </style>
</head>
<body>
  <div class="admin-wrap">
    <h1>Admin — FX &amp; SFX</h1>
    <p>Configure les effets visuels (rays/burst/new badge) et l'audio (volume, on/off). Les réglages sont sauvegardés dans <code>localStorage</code>.</p>

    <div class="form">
      <div class="card">
        <h3>Visuels</h3>
        <div class="row">
          <label><input type="checkbox" id="visual_rays_enabled"> Rays activés</label>
        </div>
        <div class="row">
          <label><input type="checkbox" id="visual_rays_spin"> Rotation des rays</label>
        </div>
        <div class="row">
          <label>Opacité des rays</label>
          <input type="range" id="visual_rays_opacity" min="0" max="1" step="0.05">
        </div>
        <div class="row">
          <label><input type="checkbox" id="visual_burst_enabled"> Burst activé</label>
        </div>
        <div class="row">
          <label><input type="checkbox" id="new_badge_enabled"> Badge NEW! activé</label>
        </div>
      </div>

      <div class="card">
        <h3>Audio</h3>
        <div class="row">
          <label><input type="checkbox" id="audio_enabled"> SFX activé</label>
        </div>
        <div class="row">
          <label>Volume</label>
          <input type="range" id="audio_volume" min="0" max="1" step="0.05">
        </div>
      </div>

      <div class="card">
        <h3>Actions</h3>
        <div class="row">
          <button id="save">Sauvegarder</button>
          <button id="reset">Réinitialiser défauts</button>
        </div>
        <div class="row" id="status" style="opacity:0.8;"></div>
      </div>
    </div>

    <h3>Aperçu</h3>
    <div class="preview" id="preview"></div>

    <p style="margin-top:16px;"><a href="../../index.html?v=v1.1.1-admin-fx">← Retour</a></p>
  </div>
  <script type="module" src="./admin.js?v=v1.1.1-admin-fx"></script>
</body>
</html>
